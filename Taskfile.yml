version: "3"

dotenv: [".env"]

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  generate:
    desc: Generate protobuf and Connect-RPC code
    cmds:
      - buf generate

  lint:
    desc: Lint protobuf definitions
    cmds:
      - buf lint

  build:
    desc: Build the notification server binary
    cmds:
      - go build -o bin/notify ./cmd/notify

  test:
    desc: Run all tests
    cmds:
      - go test -v -count=1 ./...

  run:
    desc: Run the notification server locally
    cmds:
      - go run ./cmd/notify

  up:
    desc: Start docker-compose services (NATS + Mailpit)
    cmds:
      - docker compose up -d

  down:
    desc: Stop docker-compose services
    cmds:
      - docker compose down

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
